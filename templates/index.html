<!DOCTYPE html>
<html>
<head>
    <title>Componente Camera</title>
</head>

<body>

<h2>My Web Camera 📷</h2>

<video id="video" width="400" autoplay></video>
<br><br>

<button onclick="tomarFoto()">Take Photo</button>

<h3 id="resultado">Waiting...</h3>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const video = document.getElementById("video");

// activar cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// función manual (botón)
function tomarFoto() {

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    canvas.toBlob(function(blob) {
        let formData = new FormData();
        formData.append("foto", blob, "foto.jpg");

        fetch("/foto", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("resultado").innerText = data;
        });
    });

}

// 🔥 función automática (simula tiempo real)
function enviarFrame() {

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    canvas.toBlob(function(blob) {
        let formData = new FormData();
        formData.append("foto", blob, "foto.jpg");

        fetch("/foto", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("resultado").innerText = data;
        });
    });

}

// 🔥 esto hace que sea "en vivo"
setInterval(enviarFrame, 500); // cada 0.5 segundos

</script>

</body>
</html>
